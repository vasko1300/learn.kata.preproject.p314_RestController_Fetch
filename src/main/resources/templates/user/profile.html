<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3"
      lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Profile</title>
</head>
<body>
    <!-- ======== НАВБАР ======== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <!-- Информация слева (username и роль) -->
            <div class="navbar-brand">
                <span sec:authentication="name" class="fw-bold">admin</span>
                <span class="text-light ms-2"> roles:</span>
                <span class="text-light ms-2" th:each="authority : ${#authentication.getAuthorities()}">
                    <span th:text="${#strings.replace(authority.getAuthority(), 'ROLE_', '')}"></span>
                    <span th:if="${!authorityStat.last}">, </span>
                </span>
            </div>
            <!-- Элементы справа (выход) -->
            <form th:action="@{/sign-out}" method="post">
                <button type="submit" class="btn btn-outline-danger">Logout</button>
            </form>
        </div>
    </nav>

    <!-- ======== ОСНОВНОЙ КОНТЕЙНЕР ======== -->
    <div class="container-fluid">
        <div class="row">
            <!-- ЛЕВАЯ КОЛОНКА (меню) -->
            <div class="col-md-2">
                <div class="list-group mt-3">
                    <!-- Пункт Admin (виден только администраторам) -->
                    <a sec:authorize="hasRole('ADMIN')"
                       href="/admin"
                       class="list-group-item list-group-item-action"
                       th:classappend="${#httpServletRequest.requestURI.contains('/admin')} ? 'active'">
                        Admin
                    </a>
                    <!-- Пункт User (виден всем авторизованным пользователям) -->
                    <a href="/user"
                       class="list-group-item list-group-item-action"
                       th:classappend="${#httpServletRequest.requestURI.contains('/user')} ? 'active'">
                        User
                    </a>
                </div>
            </div>

            <!-- ПРАВАЯ КОЛОНКА (контент) -->
            <div class="col-md-10 bg-body-tertiary p-3" style="min-height: 100vh; overflow-x: hidden;">
                <!-- Заголовок страницы -->
                <h1 class="mt-3 mb-3">User information-page</h1>

                <!-- Блок About user -->
                <div class="card mt-3">
                    <div class="card-header">
                        <h5 class="mb-0">About user</h5>
                    </div>
                    <div class="card-body">
                        <!-- Таблица с данными пользователя -->
                        <table class="table table-bordered table-striped mb-0">
                            <tbody>
                            <tr>
                                <th class="w-25 bg-light">ID</th>
                                <td th:text="${user.id}">—</td>
                            </tr>
                            <tr>
                                <th class="bg-light">Username</th>
                                <td th:text="${user.username}">—</td>
                            </tr>
                            <tr>
                                <th class="bg-light">First Name</th>
                                <td th:text="${user.firstName}">—</td>
                            </tr>
                            <tr>
                                <th class="bg-light">Last Name</th>
                                <td th:text="${user.secondName}">—</td>
                            </tr>
                            <tr>
                                <th class="bg-light">Birth Year</th>
                                <td th:text="${user.birthYear}">—</td>
                            </tr>
                            <tr>
                                <th class="bg-light">Roles</th>
                                <td>
                                        <span th:each="role, iterStat : ${user.roles}">
                                            <span th:text="${#strings.replace(role.name, 'ROLE_', '')}"></span>
                                            <span th:unless="${iterStat.last}">, </span>
                                        </span>
                                </td>
                            </tr>
                            </tbody>
                        </table>

                        <!-- Сообщение об успехе -->
                        <div th:if="${successMessage}" class="alert alert-success mt-3" role="alert">
                            <span th:text="${successMessage}">Profile updated successfully!</span>
                        </div>

                        <!-- Кнопки действий -->
                        <div class="mt-3 d-flex gap-2">
                            <a th:href="@{/user/edit}" class="btn btn-primary">Edit Profile</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
