<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3"
      lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit user profile</title>
</head>
<body>

<!-- ======== НАВБАР ======== -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <div class="navbar-brand">
            <span sec:authentication="name" class="fw-bold">admin</span>
            <span class="text-light ms-2" th:each="authority : ${#authentication.getAuthorities()}">
                <span th:text="${#strings.replace(authority.getAuthority(), 'ROLE_', '')}"></span>
                <span th:if="${!authorityStat.last}">, </span>
            </span>
        </div>
        <div class="d-flex">
            <a href="/logout" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>
</nav>

<!-- ======== ОСНОВНОЙ КОНТЕЙНЕР ======== -->
<div class="container-fluid">
    <div class="row">
        <!-- ЛЕВАЯ КОЛОНКА (меню) -->
        <div class="col-md-2">
            <div class="list-group mt-3">
                <!-- Admin (только для администраторов) -->
                <a sec:authorize="hasRole('ADMIN')"
                   href="/admin"
                   class="list-group-item list-group-item-action">
                    Admin
                </a>
                <!-- User (для всех) -->
                <a href="/user"
                   class="list-group-item list-group-item-action active">
                    User
                </a>
            </div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА (контент) -->
        <div class="col-md-10 bg-body-tertiary p-3" style="min-height: 100vh; overflow-x: hidden;">
            <h1 class="mt-3 mb-3">Edit Profile</h1>

            <div class="card mt-3">
                <div class="card-header">
                    <h5 class="mb-0">Update your personal information</h5>
                </div>
                <div class="card-body">
                    <!-- Информационное сообщение о пароле -->
                    <div class="alert alert-info" role="alert">
                        <span>ℹ️ To change your password or username, please contact the administrator.</span>
                    </div>

                    <!-- Форма редактирования -->
                    <form th:action="@{/user/update}" th:object="${user}" method="post">
                        <input type="hidden" th:field="*{id}" />

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Username</label>
                                <input type="text" th:field="*{username}"
                                       class="form-control bg-light"
                                       readonly
                                       style="cursor: not-allowed;" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Birth Year</label>
                                <input type="number" th:field="*{birthYear}"
                                       class="form-control"
                                       required
                                       min="1900"
                                       max="2026" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" th:field="*{firstName}"
                                       class="form-control"
                                       required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" th:field="*{secondName}"
                                       class="form-control"
                                       required />
                            </div>
                        </div>

                        <!-- Роли (только для просмотра) -->
                        <div class="mb-3">
                            <label class="form-label">Roles</label>
                            <div class="form-control bg-light" style="cursor: not-allowed;">
                                <span th:each="role, iterStat : ${user.roles}">
                                    <span th:text="${#strings.replace(role.name, 'ROLE_', '')}"></span>
                                    <span th:unless="${iterStat.last}">, </span>
                                </span>
                            </div>
                        </div>

                        <!-- Сообщение об ошибке -->
                        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                            <span th:text="${errorMessage}">Error message</span>
                        </div>

                        <!-- Кнопки действий -->
                        <div class="mt-3 d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a th:href="@{/user}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
