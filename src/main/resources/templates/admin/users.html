<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3"
      lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Management</title>
    <style>
        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .data-placeholder {
            color: #6c757d;
            font-style: italic;
        }
        /* Для таблицы */
        .table-actions {
            display: flex;
            gap: 0.25rem;
            justify-content: center;
        }
        .table-actions .btn {
            padding: 0.125rem 0.5rem;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
<!-- ======== НАВБАР ======== -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <div class="navbar-brand">
            <span id="username-display" class="fw-bold">Загрузка...</span>
            <span class="text-light ms-2"> roles:</span>
            <span id="roles-display" class="text-light ms-2">Загрузка...</span>
        </div>
        <form id="logout-form" th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-danger">Logout</button>
        </form>
    </div>
</nav>

<!-- ======== ОСНОВНОЙ КОНТЕЙНЕР ======== -->
<div class="container-fluid">
    <div class="row">
        <!-- ЛЕВАЯ КОЛОНКА (меню) -->
        <div class="col-md-2">
            <div class="list-group mt-3">
                <a id="admin-link"
                   href="/admin"
                   class="list-group-item list-group-item-action active">
                    Admin
                </a>
                <a id="user-link"
                   href="/user"
                   class="list-group-item list-group-item-action">
                    User
                </a>
            </div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА (контент) -->
        <div class="col-md-10 bg-body-tertiary p-3" style="min-height: 100vh; overflow-x: hidden;">
            <h1 class="mt-3 mb-3">Admin panel</h1>

            <!-- ======== ВКЛАДКИ (TABS) ======== -->
            <ul class="nav nav-tabs" id="adminTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active"
                            id="users-table-tab"
                            data-bs-toggle="tab"
                            data-bs-target="#users-table"
                            type="button"
                            role="tab">Users table</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link"
                            id="new-user-tab"
                            data-bs-toggle="tab"
                            data-bs-target="#new-user"
                            type="button"
                            role="tab">New User</button>
                </li>
            </ul>

            <!-- КОНТЕНТ ВКЛАДОК -->
            <div class="tab-content mt-3">
                <!-- Вкладка "Users table" -->
                <div class="tab-pane fade show active"
                     id="users-table"
                     role="tabpanel"
                     aria-labelledby="users-table-tab">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">All users</h5>
                        </div>
                        <div class="card-body p-0">
                            <!-- Индикатор загрузки -->
                            <div id="loading-indicator" class="text-center py-3">
                                <div class="loading-spinner"></div>
                                <span class="ms-2">Загрузка данных...</span>
                            </div>

                            <!-- Блок ошибок -->
                            <div id="error-message" class="alert alert-danger m-3" style="display: none;">
                                <span id="error-text"></span>
                            </div>

                            <!-- Таблица -->
                            <div id="users-table-container" style="display: none;">
                                <div class="table-responsive">
                                    <table class="table table-striped mb-0 text-center align-middle">
                                        <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Username</th>
                                            <th>First Name</th>
                                            <th>Last Name</th>
                                            <th>Birth Year</th>
                                            <th>Non expired</th>
                                            <th>Unlocked</th>
                                            <th>Credentials</th>
                                            <th>Enabled</th>
                                            <th>Role</th>
                                            <th>Edit</th>
                                            <th>Delete</th>
                                        </tr>
                                        </thead>
                                        <tbody id="users-table-body">
                                        <!-- Строки заполняются через JavaScript -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Вкладка "New User" -->
                <div class="tab-pane fade"
                     id="new-user"
                     role="tabpanel"
                     aria-labelledby="new-user-tab">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">Add new user</h5>
                        </div>
                        <div class="card-body">
                            <form id="create-user-form">
                                <div class="row mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Username</label>
                                        <input type="text" id="new-username" class="form-control" required />
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Password</label>
                                        <input type="password" id="new-password" class="form-control" required minlength="6" />
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Birth Year</label>
                                        <input type="number" id="new-birthyear" class="form-control" required min="1900" max="2026" />
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">First Name</label>
                                        <input type="text" id="new-firstname" class="form-control" required />
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Last Name</label>
                                        <input type="text" id="new-lastname" class="form-control" required />
                                    </div>
                                </div>

                                <!-- Account Status -->
                                <fieldset class="border rounded p-3 mb-3">
                                    <legend class="float-none w-auto px-2 h6">Account Status</legend>
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="form-check">
                                                <input type="checkbox" id="new-accountNonExpired" class="form-check-input" checked />
                                                <label class="form-check-label" for="new-accountNonExpired">Account Non-Expired</label>
                                            </div>
                                            <div class="form-check">
                                                <input type="checkbox" id="new-accountNonLocked" class="form-check-input" checked />
                                                <label class="form-check-label" for="new-accountNonLocked">Account Non-Locked</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-check">
                                                <input type="checkbox" id="new-credentialsNonExpired" class="form-check-input" checked />
                                                <label class="form-check-label" for="new-credentialsNonExpired">Credentials Non-Expired</label>
                                            </div>
                                            <div class="form-check">
                                                <input type="checkbox" id="new-enabled" class="form-check-input" checked />
                                                <label class="form-check-label" for="new-enabled">Enabled</label>
                                            </div>
                                        </div>
                                    </div>
                                </fieldset>

                                <!-- Роли -->
                                <div class="mb-3">
                                    <label class="form-label">Roles</label>
                                    <select id="new-roleIds" multiple class="form-select" style="height: 100px;">
                                        <!-- Заполняется из /api/roles через JavaScript -->
                                    </select>
                                    <div class="form-text">Hold Ctrl (or Cmd on Mac) to select multiple roles</div>
                                </div>

                                <!-- Сообщения -->
                                <div id="create-error-message" class="alert alert-danger" style="display: none;">
                                    <span id="create-error-text"></span>
                                </div>
                                <div id="create-success-message" class="alert alert-success" style="display: none;">
                                    <span id="create-success-text">User created successfully!</span>
                                </div>

                                <button type="submit" class="btn btn-primary" id="create-save-btn">Add new user</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ======== МОДАЛЬНЫЕ ОКНА (динамически создаются через JS) ======== -->
<div id="modals-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- ========== JAVASCRIPT ========== -->
<script>
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let allRoles = [];
    let currentUsers = [];

    // ========== ПОЛУЧЕНИЕ CSRF-ТОКЕНА ==========
    function getCsrfTokenFromCookie() {
        const name = 'XSRF-TOKEN';
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) {
            return parts.pop().split(';').shift();
        }
        return null;
    }

    // ========== ПОЛУЧЕНИЕ РОЛЕЙ ==========
    async function loadRoles() {
        try {
            const response = await fetch('/api/roles', {
                method: 'GET',
                credentials: 'same-origin'
            });
            if (!response.ok) throw new Error('Failed to load roles');
            allRoles = await response.json();
            return allRoles;
        } catch (error) {
            console.error('❌ Ошибка загрузки ролей:', error);
            return [];
        }
    }

    // ========== ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ ==========
    async function loadUsers() {
        const loadingIndicator = document.getElementById('loading-indicator');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const tableContainer = document.getElementById('users-table-container');

        try {
            loadingIndicator.style.display = 'block';
            tableContainer.style.display = 'none';
            errorMessage.style.display = 'none';

            const response = await fetch('/api/users', {
                method: 'GET',
                credentials: 'same-origin'
            });

            if (!response.ok) {
                if (response.status === 401 || response.status === 403) {
                    throw new Error('Вы не авторизованы. Пожалуйста, войдите в систему.');
                }
                throw new Error(`Ошибка загрузки пользователей (${response.status})`);
            }

            currentUsers = await response.json();
            console.log('✅ Пользователи загружены:', currentUsers);

            renderUsersTable(currentUsers);

            loadingIndicator.style.display = 'none';
            tableContainer.style.display = 'block';

        } catch (error) {
            console.error('❌ Ошибка:', error);
            loadingIndicator.style.display = 'none';
            errorMessage.style.display = 'block';
            errorText.textContent = error.message || 'Не удалось загрузить список пользователей';
        }
    }

    // ========== ОТОБРАЖЕНИЕ ТАБЛИЦЫ ==========
    function renderUsersTable(users) {
        const tbody = document.getElementById('users-table-body');
        if (!users || users.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="12" class="text-center py-3">Нет пользователей</td>
                </tr>
            `;
            return;
        }

        let html = '';
        users.forEach(user => {
            const roleNames = user.roleNames && user.roleNames.length > 0
                ? user.roleNames.map(name => name.replace('ROLE_', '')).join(', ')
                : '—';

            const roleNamesAttr = JSON.stringify(user.roleNames || []);

            html += `
                <tr data-user-id="${user.id}">
                    <td>${user.id}</td>
                    <td>${user.username || '—'}</td>
                    <td>${user.firstName || '—'}</td>
                    <td>${user.secondName || '—'}</td>
                    <td>${user.birthYear || '—'}</td>
                    <td><span class="badge ${user.accountNonExpired ? 'bg-success' : 'bg-danger'}">${user.accountNonExpired ? '✓' : '✗'}</span></td>
                    <td><span class="badge ${user.accountNonLocked ? 'bg-success' : 'bg-danger'}">${user.accountNonLocked ? '✓' : '✗'}</span></td>
                    <td><span class="badge ${user.credentialsNonExpired ? 'bg-success' : 'bg-danger'}">${user.credentialsNonExpired ? '✓' : '✗'}</span></td>
                    <td><span class="badge ${user.enabled ? 'bg-success' : 'bg-danger'}">${user.enabled ? '✓' : '✗'}</span></td>
                    <td>${roleNames}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary btn-edit"
                                data-user-id="${user.id}"
                                data-username="${user.username || ''}"
                                data-firstname="${user.firstName || ''}"
                                data-secondname="${user.secondName || ''}"
                                data-birthyear="${user.birthYear || ''}"
                                data-accountnonexpired="${user.accountNonExpired}"
                                data-accountnonlocked="${user.accountNonLocked}"
                                data-credentialsnonexpired="${user.credentialsNonExpired}"
                                data-enabled="${user.enabled}"
                                data-rolenames='${roleNamesAttr}'>
                            Edit
                        </button>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger btn-delete"
                                data-user-id="${user.id}"
                                data-username="${user.username || '—'}">
                            Delete
                        </button>
                    </td>
                </tr>
            `;
        });

        tbody.innerHTML = html;

        // Привязываем события для кнопок Edit и Delete
        document.querySelectorAll('.btn-edit').forEach(btn => {
            btn.addEventListener('click', function() {
                const userId = parseInt(this.dataset.userId);
                const user = currentUsers.find(u => u.id === userId);
                if (user) openEditModal(user);
            });
        });

        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', function() {
                const userId = parseInt(this.dataset.userId);
                const username = this.dataset.username;
                openDeleteModal(userId, username);
            });
        });
    }

    // ========== ОТКРЫТИЕ МОДАЛКИ РЕДАКТИРОВАНИЯ ==========
    function openEditModal(user) {
        // Удаляем старую модалку, если есть
        const existing = document.getElementById('editUserModal');
        if (existing) existing.remove();
        const userRoleNames = user.roleNames || [];

        const roleOptions = allRoles.map(role => {
            // Сравниваем по имени роли (без префикса)
            const roleNameWithoutPrefix = role.name.replace('ROLE_', '');
            const selected = userRoleNames.includes(roleNameWithoutPrefix) ? 'selected' : '';
            return `<option value="${role.id}" ${selected}>${roleNameWithoutPrefix}</option>`;
        }).join('');

        const modalHtml = `
            <div class="modal fade" id="editUserModal" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-lg modal-dialog-scrollable">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Edit User</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="edit-user-form">
                                <input type="hidden" id="edit-user-id" value="${user.id}" />

                                <div class="row mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Username</label>
                                        <input type="text" id="edit-username" class="form-control" value="${user.username || ''}" required />
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Password</label>
                                        <input type="password" id="edit-password" class="form-control" placeholder="Leave blank to keep current" />
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Birth Year</label>
                                        <input type="number" id="edit-birthyear" class="form-control" value="${user.birthYear || ''}" required min="1900" max="2026" />
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">First Name</label>
                                        <input type="text" id="edit-firstname" class="form-control" value="${user.firstName || ''}" required />
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Last Name</label>
                                        <input type="text" id="edit-secondname" class="form-control" value="${user.secondName || ''}" required />
                                    </div>
                                </div>

                                <fieldset class="border rounded p-3 mb-3">
                                    <legend class="float-none w-auto px-2 h6">Account Status</legend>
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="form-check">
                                                <input type="checkbox" id="edit-accountNonExpired" class="form-check-input" ${user.accountNonExpired ? 'checked' : ''} />
                                                <label class="form-check-label" for="edit-accountNonExpired">Account Non-Expired</label>
                                            </div>
                                            <div class="form-check">
                                                <input type="checkbox" id="edit-accountNonLocked" class="form-check-input" ${user.accountNonLocked ? 'checked' : ''} />
                                                <label class="form-check-label" for="edit-accountNonLocked">Account Non-Locked</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-check">
                                                <input type="checkbox" id="edit-credentialsNonExpired" class="form-check-input" ${user.credentialsNonExpired ? 'checked' : ''} />
                                                <label class="form-check-label" for="edit-credentialsNonExpired">Credentials Non-Expired</label>
                                            </div>
                                            <div class="form-check">
                                                <input type="checkbox" id="edit-enabled" class="form-check-input" ${user.enabled ? 'checked' : ''} />
                                                <label class="form-check-label" for="edit-enabled">Enabled</label>
                                            </div>
                                        </div>
                                    </div>
                                </fieldset>

                                <div class="mb-3">
                                    <label class="form-label">Roles</label>
                                    <select id="edit-roleIds" multiple class="form-select" style="height: 100px;">
                                        ${roleOptions}
                                    </select>
                                    <div class="form-text">Hold Ctrl (or Cmd on Mac) to select multiple roles</div>
                                </div>

                                <div id="edit-error-message" class="alert alert-danger" style="display: none;">
                                    <span id="edit-error-text"></span>
                                </div>
                                <div id="edit-success-message" class="alert alert-success" style="display: none;">
                                    <span id="edit-success-text">User updated successfully!</span>
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="button" class="btn btn-primary" id="edit-save-btn">Save</button>
                        </div>
                    </div>
                </div>
            </div>
        `;

        document.getElementById('modals-container').insertAdjacentHTML('beforeend', modalHtml);

        // Показываем модалку
        const modalEl = document.getElementById('editUserModal');
        const modal = new bootstrap.Modal(modalEl);
        modal.show();

        // Обработчик кнопки Save
        document.getElementById('edit-save-btn').addEventListener('click', async function() {
            await updateUser(user.id);
        });

        // Обработчик Enter на форме
        document.getElementById('edit-user-form').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('edit-save-btn').click();
            }
        });
    }

    // ========== ОБНОВЛЕНИЕ ПОЛЬЗОВАТЕЛЯ ==========
    async function updateUser(userId) {
        const saveBtn = document.getElementById('edit-save-btn');
        const errorMessage = document.getElementById('edit-error-message');
        const errorText = document.getElementById('edit-error-text');

        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';
        errorMessage.style.display = 'none';

        const payload = {
            username: document.getElementById('edit-username').value.trim(),
            firstName: document.getElementById('edit-firstname').value.trim(),
            secondName: document.getElementById('edit-secondname').value.trim(),
            birthYear: parseInt(document.getElementById('edit-birthyear').value, 10),
            accountNonExpired: document.getElementById('edit-accountNonExpired').checked,
            accountNonLocked: document.getElementById('edit-accountNonLocked').checked,
            credentialsNonExpired: document.getElementById('edit-credentialsNonExpired').checked,
            enabled: document.getElementById('edit-enabled').checked,
            roleNames: [...document.getElementById('edit-roleIds').selectedOptions]
                .map(opt => `ROLE_${opt.textContent.trim()}`)
        };

        const password = document.getElementById('edit-password').value.trim();
        if (password) {
            payload.password = password;
        }

        // Валидация
        if (!payload.username || !payload.firstName || !payload.secondName || isNaN(payload.birthYear)) {
            errorText.textContent = 'All fields are required.';
            errorMessage.style.display = 'block';
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save';
            return;
        }

        if (payload.birthYear < 1900 || payload.birthYear > 2026) {
            errorText.textContent = 'Birth year must be between 1900 and 2026.';
            errorMessage.style.display = 'block';
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save';
            return;
        }

        const csrfToken = getCsrfTokenFromCookie();
        if (!csrfToken) {
            errorText.textContent = 'Security error: CSRF token not found.';
            errorMessage.style.display = 'block';
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save';
            return;
        }

        try {
            const response = await fetch(`/api/users/${userId}`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'X-XSRF-TOKEN': csrfToken
                },
                credentials: 'same-origin',
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.message || `Error ${response.status}`);
            }

            const updatedUser = await response.json();
            console.log('✅ Пользователь обновлен:', updatedUser);

            // Закрываем модалку
            const modalEl = document.getElementById('editUserModal');
            if (modalEl) {
                const modal = bootstrap.Modal.getInstance(modalEl);
                if (modal) modal.hide();
            }

            // Обновляем таблицу
            await loadUsers();

            // ✅ ИСПРАВЛЕНО: показываем сообщение об успехе в основном контейнере
            const successMessage = document.getElementById('success-message');
            const successText = document.getElementById('success-text');
            if (successMessage) {
                successMessage.style.display = 'block';
                if (successText) successText.textContent = 'User updated successfully!';
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 3000);
            }

        } catch (error) {
            console.error('❌ Ошибка обновления:', error);
            errorText.textContent = error.message || 'Failed to update user. Please try again.';
            errorMessage.style.display = 'block';
        } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save';
        }
    }

    // ========== ОТКРЫТИЕ МОДАЛКИ УДАЛЕНИЯ ==========
    function openDeleteModal(userId, username) {
        const existing = document.getElementById('deleteUserModal');
        if (existing) existing.remove();

        const modalHtml = `
            <div class="modal fade" id="deleteUserModal" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Delete User</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <p class="text-danger">Are you sure you want to delete user <strong>${username}</strong> (ID: ${userId})?</p>
                            <p class="text-muted">This action cannot be undone.</p>
                            <div id="delete-error-message" class="alert alert-danger" style="display: none;">
                                <span id="delete-error-text"></span>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="button" class="btn btn-danger" id="delete-confirm-btn">Delete</button>
                        </div>
                    </div>
                </div>
            </div>
        `;

        document.getElementById('modals-container').insertAdjacentHTML('beforeend', modalHtml);

        const modalEl = document.getElementById('deleteUserModal');
        const modal = new bootstrap.Modal(modalEl);
        modal.show();

        document.getElementById('delete-confirm-btn').addEventListener('click', async function() {
            await deleteUser(userId);
        });
    }

    // ========== УДАЛЕНИЕ ПОЛЬЗОВАТЕЛЯ ==========
    async function deleteUser(userId) {
        const confirmBtn = document.getElementById('delete-confirm-btn');
        const errorMessage = document.getElementById('delete-error-message');
        const errorText = document.getElementById('delete-error-text');

        confirmBtn.disabled = true;
        confirmBtn.textContent = 'Deleting...';
        errorMessage.style.display = 'none';

        const csrfToken = getCsrfTokenFromCookie();
        if (!csrfToken) {
            errorText.textContent = 'Security error: CSRF token not found.';
            errorMessage.style.display = 'block';
            confirmBtn.disabled = false;
            confirmBtn.textContent = 'Delete';
            return;
        }

        try {
            const response = await fetch(`/api/users/${userId}`, {
                method: 'DELETE',
                headers: {
                    'X-XSRF-TOKEN': csrfToken
                },
                credentials: 'same-origin'
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.message || `Error ${response.status}`);
            }

            console.log('✅ Пользователь удален:', userId);

            // Закрываем модалку
            const modalEl = document.getElementById('deleteUserModal');
            if (modalEl) {
                const modal = bootstrap.Modal.getInstance(modalEl);
                if (modal) modal.hide();
            }

            // Обновляем таблицу
            await loadUsers();

            // ✅ ИСПРАВЛЕНО: показываем сообщение об успехе в основном контейнере
            const successMessage = document.getElementById('success-message');
            const successText = document.getElementById('success-text');
            if (successMessage) {
                successMessage.style.display = 'block';
                if (successText) successText.textContent = 'User deleted successfully!';
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 3000);
            }

        } catch (error) {
            console.error('❌ Ошибка удаления:', error);
            errorText.textContent = error.message || 'Failed to delete user. Please try again.';
            errorMessage.style.display = 'block';
            confirmBtn.disabled = false;
            confirmBtn.textContent = 'Delete';
        }
    }

    // ========== СОЗДАНИЕ ПОЛЬЗОВАТЕЛЯ ==========
    async function createUser(event) {
        event.preventDefault();

        const saveBtn = document.getElementById('create-save-btn');
        const errorMessage = document.getElementById('create-error-message');
        const errorText = document.getElementById('create-error-text');
        const successMessage = document.getElementById('create-success-message');

        saveBtn.disabled = true;
        saveBtn.textContent = 'Creating...';
        errorMessage.style.display = 'none';
        successMessage.style.display = 'none';

        const payload = {
            username: document.getElementById('new-username').value.trim(),
            password: document.getElementById('new-password').value.trim(),
            firstName: document.getElementById('new-firstname').value.trim(),
            secondName: document.getElementById('new-lastname').value.trim(),
            birthYear: parseInt(document.getElementById('new-birthyear').value, 10),
            accountNonExpired: document.getElementById('new-accountNonExpired').checked,
            accountNonLocked: document.getElementById('new-accountNonLocked').checked,
            credentialsNonExpired: document.getElementById('new-credentialsNonExpired').checked,
            enabled: document.getElementById('new-enabled').checked,
            roleNames: [...document.getElementById('new-roleIds').selectedOptions].map(opt => opt.textContent.trim())
        };

        // Валидация
        if (!payload.username || !payload.password || !payload.firstName || !payload.secondName || isNaN(payload.birthYear)) {
            errorText.textContent = 'All fields are required.';
            errorMessage.style.display = 'block';
            saveBtn.disabled = false;
            saveBtn.textContent = 'Add new user';
            return;
        }

        if (payload.password.length < 6) {
            errorText.textContent = 'Password must be at least 6 characters.';
            errorMessage.style.display = 'block';
            saveBtn.disabled = false;
            saveBtn.textContent = 'Add new user';
            return;
        }

        if (payload.birthYear < 1900 || payload.birthYear > 2026) {
            errorText.textContent = 'Birth year must be between 1900 and 2026.';
            errorMessage.style.display = 'block';
            saveBtn.disabled = false;
            saveBtn.textContent = 'Add new user';
            return;
        }

        const csrfToken = getCsrfTokenFromCookie();
        if (!csrfToken) {
            errorText.textContent = 'Security error: CSRF token not found.';
            errorMessage.style.display = 'block';
            saveBtn.disabled = false;
            saveBtn.textContent = 'Add new user';
            return;
        }

        try {
            const response = await fetch('/api/users/new', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-XSRF-TOKEN': csrfToken
                },
                credentials: 'same-origin',
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.message || `Error ${response.status}`);
            }

            const createdUser = await response.json();
            console.log('✅ Пользователь создан:', createdUser);

            // Очищаем форму
            document.getElementById('new-username').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('new-firstname').value = '';
            document.getElementById('new-lastname').value = '';
            document.getElementById('new-birthyear').value = '';
            document.getElementById('new-accountNonExpired').checked = true;
            document.getElementById('new-accountNonLocked').checked = true;
            document.getElementById('new-credentialsNonExpired').checked = true;
            document.getElementById('new-enabled').checked = true;
            [...document.getElementById('new-roleIds').options].forEach(opt => opt.selected = false);

            // Показываем успех
            successMessage.style.display = 'block';
            document.getElementById('create-success-text').textContent = 'User created successfully!';
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 3000);

            // Переключаемся на вкладку Users table
            const usersTab = document.getElementById('users-table-tab');
            if (usersTab) usersTab.click();

            // Обновляем таблицу
            await loadUsers();

        } catch (error) {
            console.error('❌ Ошибка создания:', error);
            errorText.textContent = error.message || 'Failed to create user. Please try again.';
            errorMessage.style.display = 'block';
        } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = 'Add new user';
        }
    }

    // ========== ЗАГРУЗКА ПРОФИЛЯ ТЕКУЩЕГО ПОЛЬЗОВАТЕЛЯ ==========
    async function loadProfile() {
        try {
            const response = await fetch('/api/profile', {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin'
            });
            if (!response.ok) {
                throw new Error('Failed to load profile');
            }
            const user = await response.json();
            document.getElementById('username-display').textContent = user.username || 'Гость';
            const rolesNames = user.roles && user.roles.length > 0
                ? user.roles.map(name => name.replace('ROLE_', '')).join(', ')
                : '—';
            document.getElementById('roles-display').textContent = rolesNames;
        } catch (error) {
            console.error('❌ Ошибка загрузки профиля:', error);
        }
    }

    // ========== ЗАПОЛНЕНИЕ SELECT РОЛЕЙ ==========
    function populateRoleSelect() {
        const select = document.getElementById('new-roleIds');
        if (!select) return;
        select.innerHTML = '';
        allRoles.forEach(role => {
            const option = document.createElement('option');
            option.value = role.id;
            option.textContent = role.name.replace('ROLE_', '');
            select.appendChild(option);
        });
    }

    // ========== ВЫХОД ИЗ СИСТЕМЫ ==========
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }

    async function logout() {
        const csrfToken = getCookie('XSRF-TOKEN');
        const response = await fetch('/api/auth/logout', {
            method: 'POST',
            credentials: 'same-origin',
            headers: {
                'Content-Type': 'application/json',
                'X-XSRF-TOKEN': csrfToken || ''
            }
        });
        if (response.ok) {
            window.location.href = '/login?logout=true';
        } else {
            console.error('Logout failed:', response.status);
        }
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    document.addEventListener('DOMContentLoaded', async () => {
        // Загружаем роли
        await loadRoles();
        populateRoleSelect();

        // Загружаем профиль текущего пользователя
        await loadProfile();

        // Загружаем список пользователей
        await loadUsers();

        // Обработчик формы создания
        const createForm = document.getElementById('create-user-form');
        if (createForm) {
            createForm.addEventListener('submit', createUser);
        }

        // Логаут через Fetch
        const logoutForm = document.getElementById('logout-form');
        if (logoutForm) {
            logoutForm.addEventListener('submit', (event) => {
                event.preventDefault();
                logout();
            });
        }

        // Сообщение об успехе (скрываем через 5 секунд)
        const successMsg = document.getElementById('success-message');
        if (successMsg) {
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 5000);
        }
    });
</script>
</body>
