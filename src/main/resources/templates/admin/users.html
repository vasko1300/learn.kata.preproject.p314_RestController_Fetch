<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<a th:href="@{/admin/new}" class="btn btn-add">+ Add New User</a>
<h2>User List</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Password</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Birth Year</th>
        <th>Account Status</th>
        <th>Account UnLocked</th>
        <th>Credentials</th>
        <th>Enabled</th>
        <th>Roles</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}">－</td>
        <td th:text="${user.username}">－</td>
        <td>••••••</td>
        <td th:text="${user.firstName}">－</td>
        <td th:text="${user.secondName}">－</td>
        <td th:text="${user.birthYear}">－</td>

        <!-- Статус Account Non Expired -->
        <td>
            <span th:if="${user.accountNonExpired}" class="status-active">✓ Active</span>
            <span th:unless="${user.accountNonExpired}" class="status-inactive">✗ Expired</span>
        </td>

        <!-- Статус Account Non Locked -->
        <td>
            <span th:if="${user.accountNonLocked}" class="status-active">✓ Unlocked</span>
            <span th:unless="${user.accountNonLocked}" class="status-inactive">✗ Locked</span>
        </td>

        <!-- Статус Credentials Non Expired -->
        <td>
            <span th:if="${user.credentialsNonExpired}" class="status-active">✓ Active</span>
            <span th:unless="${user.credentialsNonExpired}" class="status-inactive">✗ Expired</span>
        </td>

        <!-- Статус Enabled -->
        <td>
            <span th:if="${user.enabled}" class="status-active">✓ Enabled</span>
            <span th:unless="${user.enabled}" class="status-inactive">✗ Disabled</span>
        </td>

        <!-- Roles -->
        <td>
                    <span th:each="role, iterStat : ${user.roles}">
                        <span th:text="${role.name}"></span><span th:unless="${iterStat.last}">, </span>
                    </span>
            <span th:if="${#lists.isEmpty(user.roles)}" style="color: gray;">No roles</span>
        </td>

        <td>
            <div class="actions">
                <!-- Кнопка редактирования -->
                <a th:href="@{/admin/edit(id=${user.id})}"
                   class="btn btn-edit">Edit</a>

                <!-- Кнопка удаления (с JavaScript подтверждением) -->
                <a th:href="@{/admin/delete(id=${user.id})}"
                   class="btn btn-delete"
                   onclick="return confirm('Are you sure you want to delete this user?')">Delete</a>
            </div>
        </td>
    </tr>
    </tbody>
</table>

<div class="actions">
    <a th:href="@{/logout}" class="btn btn-delete">Logout</a>
    <a th:href="@{/}" class="btn btn-back">Back to Home</a>
</div>
</body>
</html>
